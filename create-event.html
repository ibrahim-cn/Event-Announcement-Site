<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="toast.css">
    <link rel="stylesheet" href="ui.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <h1 class="logo">SportEvents</h1>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="create-event.html">Create Event</a></li>

               
                <li id="loginLink"><a href="login.html">Login</a></li>
                <li id="registerLink"><a href="register.html">Register</a></li>

                <li id="userInfo"></li>

                <li id="logoutLink"><a href="#">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main class="form-page">
        <div class="form-card">
            <h2>Create a Sports Event</h2>

            <form id="eventForm">
                <input type="text" id="eventTitle" placeholder="Event Title" required>
                <input type="date" id="eventDate" required>
                <input type="text" id="eventLocation" placeholder="Location" required>

                <select id="eventCategory" required>
                    <option value="sports">Sports</option>
                </select>

                <textarea id="eventDescription" placeholder="Event Description" rows="5" required></textarea>

                <button type="submit" class="create-btn">Create Event</button>
            </form>

            <div id="eventPreview" class="preview-box">
                <h3>Latest Created Event</h3>
                <p>No event created yet.</p>
            </div>
        </div>
    </main>

   
    <script src="create-event.js"></script>
    <script src="logout.js"></script>

    <div id="toastContainer"></div>

    <script src="toast.js"></script>
    <script src="navbar.js"></script>

</body>
</html>
