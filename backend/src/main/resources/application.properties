# ===== Server Config =====
server.port=8081
# Include exception message in JSON error responses (demo; turn off in production if needed)
server.error.include-message=always

# Static UI: ../frontend and project-root style.css (run Maven with working directory backend/)
spring.web.resources.static-locations=file:../frontend/,file:../,classpath:/static/

# ===== H2 file-based database (persists under ./data/ when app stops) =====
spring.datasource.url=jdbc:h2:file:./data/eventdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Always apply seed SQL (including src/main/resources/data.sql) on startup.
spring.sql.init.mode=always

# ===== JPA / Hibernate =====
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
# Run data.sql after Hibernate creates/updates schema
spring.jpa.defer-datasource-initialization=true

# Regenerate src/main/resources/data.sql after each persist (team sync via Git)
app.data-sql.auto-export=false

# JWT (use a strong random secret in production; min 32 chars for HS256)
app.jwt.secret=dev-only-change-me-32chars-minimum!!
app.jwt.expiration-ms=86400000

# ===== H2 Console (for debugging) =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JSON Settings =====
spring.jackson.serialization.fail-on-empty-beans=false
