<!--
This page allows registered users to log into the system.
Successful login information is stored in localStorage as currentUser.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="toast.css">
    <link rel="stylesheet" href="ui.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <h1 class="logo"><a href="index.html">SportEvents</a></h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li id="adminLink" style="display: none;"><a href="admin.html" style="color: #4c6ef5;">Admin Panel</a></li>

                <li id="loginLink"><a href="login.html">Login</a></li>
                <li id="registerLink"><a href="register.html">Register</a></li>

                <li id="userInfo"></li>

                <li id="logoutLink"><a href="#">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main class="form-page">
        <div class="form-card">
            <h2>Login</h2>

            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="admin@event.web" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit" class="create-btn">Login</button>
            </form>

            <div id="registerPrompt" style="display: none; margin-top: 20px; text-align: center; padding: 15px; border-radius: 8px; background-color: #ffebee; border: 1px solid #e57373; color: #b71c1c;">
                <p style="margin-bottom: 10px; font-weight: bold; font-size: 16px;">Account not found!</p>
                <p style="margin-bottom: 15px; font-size: 14px;">It looks like you don't have an account yet. Please create one to register for events.</p>
                <a href="register.html" class="auth-action auth-action--register">Create an Account</a>
            </div>
        </div>
    </main>

    <div id="toastContainer"></div>

    <script src="toast.js"></script>
    <script src="auth.js"></script>
    <script src="logout.js"></script>
    <script src="navbar.js"></script>
</body>
</html>
