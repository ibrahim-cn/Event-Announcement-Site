<!--
This page is the homepage of the sports event platform.
Users can search and view all created sports events.
Only the event owner can see the cancel button for their own events.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Event Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="toast.css">
    <link rel="stylesheet" href="ui.css">
</head>
<body>

    <!-- Navigation bar: users can move between pages -->
    <header>
        <nav class="navbar">
            <h1 class="logo">SportEvents</h1>

            <!-- Menu links -->
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="create-event.html">Create Event</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="#" id="logoutLink">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Hero section: introduction of the page -->
        <section class="hero">
            <h2>Discover Sports Events</h2>
            <p>Browse and find events that match your interests.</p>
        </section>

        <!-- Search and filter section -->
        <section class="filters">
            <input type="text" id="searchInput" placeholder="Search events...">

            <select id="categoryFilter">
                <option value="sports">Sports</option>
            </select>
        </section>

        <!-- Event list section -->
        <section class="event-list" id="eventList">
        </section>
    </main>

    <script src="script.js"></script>
    <script src="logout.js"></script>
    <div id="toastContainer"></div>

    <script src="toast.js"></script>
    <script src="navbar.js"></script>
</body>
</html>
