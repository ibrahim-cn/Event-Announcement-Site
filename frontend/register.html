<!--
Register via API (JWT authentication).
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./toast.css">
    <link rel="stylesheet" href="./ui.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <h1 class="logo"><a href="index.html">SportEvents</a></h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="create-event.html">Create Event</a></li>

                <li id="loginLink"><a href="login.html">Login</a></li>
                <li id="registerLink"><a href="register.html">Register</a></li>

                <li id="userInfo" style="color: white; font-weight: bold;"></li>

                <li id="logoutLink"><a href="#">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main class="form-page">
        <div class="form-card">
            <h2>Register</h2>

            <form id="registerForm">
                <input type="text" id="registerUsername" placeholder="Username" required>
                <input type="email" id="registerEmail" placeholder="Email" required>
                <input type="tel" id="registerPhone" placeholder="Phone (e.g. +90 5xx xxx xx xx)" required>
                <input type="password" id="registerPassword" placeholder="Password" required>
                <button type="submit" class="create-btn">Register</button>
            </form>

            <div id="registerMessage" class="preview-box">
                <p>No registration yet.</p>
            </div>
        </div>
    </main>

    <div id="toastContainer"></div>

    <script src="./toast.js"></script>
    <script src="./auth.js"></script>
    <script src="./logout.js"></script>
    <script src="./navbar.js"></script>
</body>
</html>
