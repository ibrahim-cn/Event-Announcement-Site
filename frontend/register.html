<!--
Register: POST /api/auth/register — password stored as plain text in DB; returns JWT.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <nav class="navbar">
      <h1 class="logo">SportEvents</h1>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="create-event.html">Create Event</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="#" id="logoutLink">Logout</a></li>
      </ul>
    </nav>
  </header>

  <main class="form-page">
    <div class="form-card">
      <h2>Register</h2>

      <form id="registerForm">
        <input type="text" id="registerUsername" placeholder="Username" required>
        <input type="email" id="registerEmail" placeholder="Email" required>
        <input type="password" id="registerPassword" placeholder="Password" required>
        <button type="submit" class="create-btn">Register</button>
      </form>

      <div id="registerMessage" class="preview-box">
        <p>No registration yet.</p>
      </div>
    </div>
  </main>

  <script src="auth.js"></script>
  <script src="logout.js"></script>
</body>
</html>
